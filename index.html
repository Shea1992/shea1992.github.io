<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=/ai-skill-kits/" />
  <title>Shea1992 主页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 28px;
      color: white;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #c7d2fe, #fbcfe8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0.75rem;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 14px;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    a:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-2px);
    }
    a .arrow { opacity: 0.5; }
    a:hover .arrow { opacity: 1; transform: translateX(2px); }
    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
      font-size: 0.8rem;
      color: #64748b;
    }
    code {
      background: rgba(99, 102, 241, 0.15);
      color: #c4b5fd;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: "JetBrains Mono", "Consolas", monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">S</div>
    <h1>Shea1992's Pages</h1>
    <p class="subtitle">AI · 工程 · 基础设施 — 部署在 GitHub Pages 上的个人主站域名</p>

    <div class="links">
      <a href="/ai-skill-kits/">
        <span>🧠 AI 技能智库门户</span>
        <span class="arrow">→</span>
      </a>
      <a href="https://github.com/Shea1992">
        <span>📂 GitHub 主页</span>
        <span class="arrow">↗</span>
      </a>
    </div>

    <div class="footer">
      自定义域名：<code>www.ai-general.cn</code><br>
      子站点访问：<code>www.ai-general.cn/&lt;repo&gt;/</code>
    </div>
  </div>
</body>
</html>
